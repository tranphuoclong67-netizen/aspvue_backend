name: Backend CD Pipeline (Develop to Main Merge)

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types: 
      - closed
      
jobs:
  build_and_push_docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/aspnet-backend:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/aspnet-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger Production Deploy
        run: curl -X GET ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}

      - name: Report Production Deployment Status
        run: echo "Backend production deployment triggered on Render and Docker image pushed to Docker Hub."